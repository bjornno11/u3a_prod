{% extends "base.html" %}

{% block title %}
{% if utvalg_objekt %}Rediger utvalg{% else %}Nytt utvalg{% endif %} – Lokallag admin
{% endblock %}

{% block content %}

<div class="container my-4">

  <a href="{% url 'lokaladmin:utvalg' %}" class="btn btn-outline-secondary mb-3">
    ← Tilbake til utvalg
  </a>

  <div class="bg-white rounded-3 shadow-sm p-4">

    <h1 class="mb-4">
      {% if utvalg_objekt %}Rediger utvalg{% else %}Nytt utvalg{% endif %}
    </h1>

    <form method="post">
      {% csrf_token %}

      <div class="mb-3">
        <label class="form-label">Navn</label>
        <input
          type="text"
          name="navn"
          class="form-control"
          required
          value="{{ utvalg_objekt.navn|default:'' }}">
      </div>

      <div class="mb-4">
        <label class="form-label">Beskrivelse</label>
        <textarea
          name="beskrivelse"
          class="form-control"
          rows="4">{{ utvalg_objekt.beskrivelse|default:'' }}</textarea>
      </div>

      <button type="submit" class="btn btn-primary">
        Lagre utvalg
      </button>

      <a href="{% url 'lokaladmin:utvalg' %}" class="btn btn-secondary">
        Avbryt
      </a>

    </form>

  </div>
</div>

{% endblock %}

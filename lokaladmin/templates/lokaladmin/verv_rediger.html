{% extends "base.html" %}

{% block title %}
Rediger verv
{% endblock %}

{% block content %}

<div class="container my-4">

  <div class="bg-white rounded-3 shadow-sm p-4">

    <h1 class="mb-4">
      Rediger verv
    </h1>

    <form method="post">

      {% csrf_token %}

      <div class="mb-3">

        <label class="form-label">
          Rolle
        </label>

        <input
          type="text"
          class="form-control"
          value="{{ verv.rolle.navn }}"
          disabled>

      </div>

      <div class="mb-3">

        <label class="form-label">
          Medlem
        </label>

        <input
          type="text"
          class="form-control"
          value="{{ verv.medlem.fornavn }} {{ verv.medlem.etternavn }}"
          disabled>

      </div>

      <div class="mb-3">

        <label class="form-label">
          Fra dato
        </label>

        <input
          type="date"
          name="fra_dato"
          class="form-control"
          value="{{ verv.fra_dato|date:'Y-m-d' }}">

      </div>

      <div class="mb-3">

        <label class="form-label">
          Til dato
        </label>

        <input
          type="date"
          name="til_dato"
          class="form-control"
          value="{{ verv.til_dato|date:'Y-m-d' }}">

      </div>

      <div class="form-check mb-4">

        <input
          class="form-check-input"
          type="checkbox"
          name="aktiv"
          {% if verv.aktiv %}checked{% endif %}>

        <label class="form-check-label">
          Aktivt verv
        </label>

      </div>

      <button type="submit"
              class="btn btn-primary">
        Lagre endringer
      </button>

    </form>

  </div>

</div>

{% endblock %}

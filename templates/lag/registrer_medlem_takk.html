<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registrert</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">


    <style>
        body {
            font-size: 18px;
            background: #f8f9fa;
        }

        .medlem-card {
            max-width: 680px;
            margin: 24px 0 24px 12px;
        }

        @media (max-width: 768px) {
            body {
                font-size: 20px;
            }

            .medlem-card {
                margin: 10px 0;
                border-radius: 0;
            }

            h2 {
                font-size: 1.7rem;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <div class="card shadow p-4 medlem-card">

        <h2 class="mb-3">
            Takk for registreringen
        </h2>

        <p>
            Du er nå registrert som medlem i
            <strong>{{ organisasjon.organisasjon|default:"U3A" }}</strong>.
        </p>

        <p class="mt-3">
            Vi vil ta kontakt med deg ved behov.
        </p>

	<a href="{% url 'lokaladmin:dashboard' %}" class="btn btn-outline-secondary mb-3">
	    ← Tilbake til lokaladmin
	</a>
        <hr class="mt-4">

        <div class="small text-muted">
            {{ organisasjon.organisasjon|default:"U3A" }}<br>
            E-post: {{ organisasjon.epost|default:"post@u3a.no" }}
        </div>

    </div>
</div>

</body>
</html>
